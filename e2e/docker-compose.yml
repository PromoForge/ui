services:
  postgres:
    image: postgres:18
    container_name: promoforge-e2e-postgres
    environment:
      POSTGRES_USER: promoforge
      POSTGRES_PASSWORD: promoforge
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promoforge"]
      interval: 2s
      timeout: 5s
      retries: 15

  promoforge:
    container_name: promoforge-e2e-server
    build:
      context: .
      dockerfile: Dockerfile.server
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7243:7243"
      - "7233:7233"
